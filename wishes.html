<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(
135deg,
#ffd6e7,
#ffeaf3,
#ffffff
);
}

.title{
font-family:'Pacifico',cursive;
font-size:55px;
color:#ff4f8b;
margin-bottom:20px;
text-align:center;
}

.card{
width:90%;
max-width:800px;
background:white;
padding:50px;
border-radius:30px;
box-shadow:0 15px 40px rgba(0,0,0,.12);
text-align:center;
}

#message{
font-size:28px;
line-height:1.8;
color:#ff4f8b;
font-weight:600;
min-height:140px;
animation:fade 1s;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.progress{
margin-top:25px;
height:12px;
background:#ffe2ee;
border-radius:50px;
overflow:hidden;
}

.progress-bar{
height:100%;
width:0%;
background:#ff4f8b;
transition:.5s;
}

.counter{
margin-top:15px;
color:#777;
font-size:15px;
}

.controls{
margin-top:25px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.btn{
border:none;
padding:12px 25px;
border-radius:30px;
background:#ff4f8b;
color:white;
cursor:pointer;
font-weight:bold;
}

.back{
margin-top:30px;
padding:15px 30px;
border-radius:50px;
background:#ff4f8b;
color:white;
text-decoration:none;
font-weight:bold;
}

.floating{
position:fixed;
font-size:25px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{

from{
transform:translateY(-50px);
}

to{
transform:translateY(110vh);
}

}

</style>
</head>

const msg =
document.getElementById("message");

const counter =
document.getElementById("counter");

const bar =
document.getElementById("bar");

let current=0;
let playing=true;

function showMessage(){

msg.style.animation="none";
void msg.offsetWidth;
msg.style.animation="fade 1s";

msg.innerHTML=messages[current];

counter.innerHTML=
`Pesan ${current+1} dari ${messages.length}`;

bar.style.width=
((current+1)/messages.length)*100+"%";

}

showMessage();

let slider=setInterval(nextMessage,3000);

function nextMessage(){

current++;

if(current>=messages.length){

current=0;

}

showMessage();

}

document.getElementById("nextBtn")
.addEventListener("click",nextMessage);

document.getElementById("pauseBtn")
.addEventListener("click",function(){

if(playing){

clearInterval(slider);

this.innerHTML="▶️ Play";

}else{

slider=setInterval(nextMessage,3000);

this.innerHTML="⏸️ Pause";

}

playing=!playing;

});

function createHeart(){

const heart =
document.createElement("div");

heart.className="floating";

heart.innerHTML=
Math.random()>0.5 ? "❤️" : "💖";

heart.style.left=
Math.random()*100+"vw";

heart.style.animationDuration=
(Math.random()*5+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},9000);

}

setInterval(createHeart,600);

</script>

<audio id="bgMusic" loop>

<script>
    const bgMusic = document.getElementById("bgMusic");
    
    window.addEventListener("load", () => {
    
        const savedTime =
            localStorage.getItem("musicTime");
    
        if(savedTime){
            bgMusic.currentTime =
            parseFloat(savedTime);
        }
    
        bgMusic.play().catch(()=>{});
    
    });
    
    setInterval(() => {
    
        localStorage.setItem(
            "musicTime",
            bgMusic.currentTime
        );
    
    },500);
