<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Galeri Kenangan Kita 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap" rel="stylesheet">

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background: radial-gradient(circle at top,#ffe0f5,#fff5fb,#ffffff);
overflow-x:hidden;
}

/* ===== BACKGROUND GLOW ===== */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(255,182,255,.25), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(173,216,255,.2), transparent 40%),
radial-gradient(circle at 50% 80%, rgba(255,255,255,.3), transparent 50%);
z-index:-1;
animation:glow 6s ease-in-out infinite alternate;
}

@keyframes glow{
from{filter:blur(0px);}
to{filter:blur(8px);}
}

/* ===== HEADER ===== */
.header{
text-align:center;
padding:40px 20px;
}

.header h1{
font-family:'Pacifico',cursive;
font-size:clamp(28px,5vw,50px);
color:#ff4f8b;
text-shadow:0 0 15px rgba(255,79,139,.2);
}

.header p{
color:#666;
margin-top:8px;
}

/* ===== GRID (PINTEREST STYLE) ===== */
.gallery{
max-width:1200px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
grid-auto-rows:200px;
gap:18px;
}

/* ===== PHOTO CARD ===== */
.photo{
position:relative;
border-radius:18px;
overflow:hidden;
cursor:pointer;
background:white;
box-shadow:0 8px 20px rgba(0,0,0,.08);
transition:.3s ease;
transform:rotate(var(--r,0deg));
}

/* random tilt */
.photo:nth-child(odd){--r:-1deg;}
.photo:nth-child(even){--r:1deg;}

.photo:hover{
transform:scale(1.05) rotate(0deg);
box-shadow:0 12px 30px rgba(255,79,139,.25);
z-index:2;
}

/* IMAGE */
.photo img{
width:100%;
height:100%;
object-fit:cover;
transition:.4s;
}

.photo:hover img{
transform:scale(1.1);
}

/* OVERLAY */
.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.5),transparent);
opacity:0;
transition:.3s;
}

.photo:hover .overlay{
opacity:1;
}

/* CAPTION */
.caption{
position:absolute;
bottom:10px;
left:10px;
right:10px;
color:white;
font-size:13px;
opacity:0;
transition:.3s;
}

.photo:hover .caption{
opacity:1;
}

/* STICKER */
.sticker{
position:absolute;
top:8px;
right:8px;
background:rgba(255,255,255,.8);
padding:4px 8px;
border-radius:999px;
font-size:12px;
}

/* ===== FEATURE BIG PHOTO ===== */
.featured{
grid-column:span 2;
grid-row:span 2;
}

/* ===== LIGHTBOX ===== */
.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}

.lightbox img{
max-width:90%;
max-height:80%;
border-radius:12px;
box-shadow:0 0 30px rgba(255,255,255,.2);
animation:zoom .3s ease;
}

@keyframes zoom{
from{transform:scale(.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.close{
position:absolute;
top:20px;
right:25px;
font-size:30px;
color:white;
cursor:pointer;
}

/* BUTTON BACK */
.back{
display:block;
width:220px;
margin:40px auto;
padding:12px;
text-align:center;
border-radius:999px;
background:linear-gradient(45deg,#ff4f8b,#ff9acb);
color:white;
text-decoration:none;
font-weight:600;
box-shadow:0 0 20px rgba(255,79,139,.3);
}

.back:hover{
transform:scale(1.05);
}

/* FLOAT HEART */
.heart{
position:fixed;
font-size:18px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* MOBILE */
@media(max-width:600px){
.featured{
grid-column:span 1;
grid-row:span 1;
}
.gallery{
grid-auto-rows:160px;
}
}

</style>
</head>

<body>

<div class="header">
<h1>📸 Galeri Kenangan Kita 💖</h1>
<p>Setiap foto punya cerita kecil yang hangat 🌸</p>
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery">

<div class="photo featured"><img src="images/0.jpg"><div class="sticker">💖 SPECIAL</div><div class="overlay"></div></div>

<div class="photo"><img src="images/2.png"><div class="sticker">😘</div><div class="overlay"></div></div>

<div class="photo"><img src="images/3.jpg"><div class="sticker">🌹</div><div class="overlay"></div></div>

<div class="photo"><img src="images/photo1.jpeg"><div class="sticker">💏</div><div class="overlay"></div></div>

<div class="photo"><img src="images/4.png"><div class="sticker">💍</div><div class="overlay"></div></div>

<div class="photo"><img src="images/5.png"><div class="sticker">💌</div><div class="overlay"></div></div>

<div class="photo featured"><img src="images/10.jpg"><div class="sticker">💖 SPECIAL</div><div class="overlay"></div></div>

<div class="photo"><img src="images/8.png"><div class="sticker">❤️</div><div class="overlay"></div></div>

<div class="photo"><img src="images/11.png"><div class="sticker">😍</div><div class="overlay"></div></div>

<div class="photo"><img src="images/12.png"><div class="sticker">👩‍❤️‍💋‍👨</div><div class="overlay"></div></div>

<div class="photo featured"><img src="images/8.jpg"><div class="sticker">💖 SPECIAL</div><div class="overlay"></div></div>

<div class="photo"><img src="images/poto letter.jpg"><div class="sticker">😼</div><div class="overlay"></div></div>

<div class="photo featured"><img src="images/7.jpg"><div class="sticker">💖 SPECIAL</div><div class="overlay"></div></div>

<div class="photo"><img src="images/16.png"><div class="sticker">🥰</div><div class="overlay"></div></div>

<div class="photo"><img src="images/16.jpg"><div class="sticker">🫶</div><div class="overlay"></div></div>

<div class="photo featured"><img src="images/10.png"><div class="sticker">💖 SPECIAL</div><div class="overlay"></div></div>

<div class="photo"><img src="images/15.jpg"><div class="sticker">🥰</div><div class="overlay"></div></div>

<div class="photo "><img src="images/17.jpg"><div class="sticker">🫶</div><div class="overlay"></div></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLB()">×</span>
<img id="lbImg">
</div>

<audio id="bgMusic" loop>
    <source src="music/birthday.mp3" type="audio/mpeg">
</audio>

<a href="index.html" class="back">🏠 Kembali</a>

<script>

// FLOAT HEART
function heart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML=Math.random()>0.5?"💖":"✨";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*5+4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),9000);
}
setInterval(heart,500);

// LIGHTBOX
const photos=document.querySelectorAll(".photo");
const lb=document.getElementById("lightbox");
const lbImg=document.getElementById("lbImg");

photos.forEach(p=>{
p.addEventListener("click",()=>{
const img=p.querySelector("img");
lb.style.display="flex";
lbImg.src=img.src;
});
});

function closeLB(){
lb.style.display="none";
}

lb.addEventListener("click",(e)=>{
if(e.target===lb) closeLB();
});

</script>

<script>
    const bgMusic = document.getElementById("bgMusic");
    
    window.addEventListener("load", () => {
    
        const savedTime =
            localStorage.getItem("musicTime");
    
        if(savedTime){
            bgMusic.currentTime =
            parseFloat(savedTime);
        }
    
        bgMusic.play().catch(()=>{});
    
    });
    
    setInterval(() => {
    
        localStorage.setItem(
            "musicTime",
            bgMusic.currentTime
        );
    
    },500);
</script>

</body>
</html>
